apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrawatch-frontend
  namespace: default
  labels:
    app: infrawatch-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infrawatch-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: infrawatch-frontend
    spec:
      containers:
        - name: infrawatch-frontend
          image: YOUR_DOCKERHUB_USERNAME/infrawatch-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: infrawatch-frontend
  namespace: default
spec:
  selector:
    app: infrawatch-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
