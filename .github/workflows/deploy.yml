name: Build, Test & Deploy InfraWatch

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: ${{ secrets.SECRET }}/infrawatch-backend
  FRONTEND_IMAGE: ${{ secrets.SECRET }}/infrawatch-frontend

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # NO cache here — we don't have package-lock.json, only package.json

      - name: Install backend deps
        # npm install works without package-lock.json, npm ci does NOT
        run: cd backend && npm install

      - name: Run backend tests
        # --if-present means it won't fail if no test script exists
        run: cd backend && npm test --if-present

  # ── Job 2: Build & Push Docker Images ────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    # Only run on actual pushes, not pull requests
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SECRET }}
          password: ${{ secrets.DOCKERSECRET }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Tag with both the commit SHA (unique) and latest
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Kubernetes ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    # Only deploy when pushing to main branch (not develop, not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        # Decode the base64 kubeconfig secret and write to ~/.kube/config
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIGSECRET }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        # This will fail fast with a clear error if kubeconfig is wrong
        run: kubectl cluster-info

      - name: Update image tags in K8s manifests
        # Replace the placeholder image name with the real one + commit SHA
        run: |
          sed -i "s|SECRET/infrawatch-backend:latest|${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|SECRET/infrawatch-frontend:latest|${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Deploy all manifests to Kubernetes
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/infrawatch-backend --timeout=180s
          kubectl rollout status deployment/infrawatch-frontend --timeout=180s

      - name: Deployment summary
        run: |
          echo "========================================="
          echo "Deployment complete!"
          echo "Backend : ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          echo "========================================="
          kubectl get pods
          kubectl get svc
